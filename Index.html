<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Generator Kelengkapan SPJ</title>
  <!-- Memanggil Bootstrap 5 untuk tampilan rapi tanpa perlu ngetik CSS manual -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Generator Kelengkapan Nota SPJ</h5>
          </div>
          
          <div class="card-body" id="app-content">
            <!-- Tampilan Loading (Animasi Muter) saat web pertama dibuka -->
            <div id="loading" class="text-center py-5">
              <div class="spinner-border text-primary" role="status"></div>
              <p class="mt-2 text-muted">Mengecek database dan kamus data...</p>
            </div>
            
            <!-- Tempat untuk Form Inisiasi atau Form Generator nantinya -->
            <div id="main-view"></div>
          </div>
          
        </div>
      </div>
    </div>
  </div>

  <!-- Script untuk berkomunikasi dengan Backend (Controller.gs) -->
  <script>
    window.addEventListener('load', function() {
      // Menjalankan fungsi ctrlGetAppStatus() di server saat halaman dimuat
      google.script.run
        .withSuccessHandler(function(response) {
          // Hilangkan animasi loading
          document.getElementById('loading').style.display = 'none';
          
          const viewContainer = document.getElementById('main-view');
          
          // Logika Penentuan Mode Tampilan
          if (response.isSetupComplete) {
            viewContainer.innerHTML = `
              <div class="alert alert-success">
                <strong>Mode Operasional Siap!</strong><br>
                Kamus data DPA berhasil ditemukan. (Form Generator akan kita taruh di sini).
              </div>`;
          } else {
            viewContainer.innerHTML = `
              <div class="alert alert-warning">
                <strong>Mode Inisiasi!</strong><br>
                Database masih kosong. (Form Setup DPA Tahunan akan kita taruh di sini).
              </div>`;
          }
        })
        .withFailureHandler(function(error) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('main-view').innerHTML = `
            <div class="alert alert-danger">Terjadi Kesalahan Server: ${error.message}</div>`;
        })
        .ctrlGetAppStatus();
    });
  </script>
</body>
</html>
